name: Supply Chain Gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  dependency-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Sloppy Joe
        run: cargo install sloppy-joe --locked

      - name: Generate Sloppy Joe config
        run: |
          mkdir -p "$RUNNER_TEMP/sloppy-joe"
          cat > "$RUNNER_TEMP/sloppy-joe/config.json" <<'JSON'
          {
            "internal": {
              "npm": ["@harishmaran/*"],
              "pypi": ["harishmaran-*"]
            },
            "min_version_age_hours": 24,
            "allow_legacy_npm_v1_lockfile": false
          }
          JSON
          echo "SLOPPY_JOE_CONFIG=$RUNNER_TEMP/sloppy-joe/config.json" >> "$GITHUB_ENV"

      - name: Sloppy Joe dependency check
        run: sloppy-joe check --config "$SLOPPY_JOE_CONFIG"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high and critical)
        run: npm audit --audit-level=high
